<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CAO 3D TOOL</title>
    <style>
      body {
        margin: 0;
        font-family: Arial, Helvetica, sans-serif;
      }

      canvas {
        width: 100%;
        height: 100%;
      }

      #canvas2 {
        height: 90%;
      }

      #forma {
        height: 5%;
        margin-top: 5px;
      }
    </style>
  </head>
  <body oncontextmenu="return false;">
    <div id="forma">
      <form>
        Largo:
        <input type="number" name="largo" value="100" />
        Ancho:
        <input type="number" name="ancho" value="100" />
        Alto:
        <input type="number" name="alto" value="100" />
        <input type="radio" name="unidades" value="cm" checked /> cm
        <input type="radio" name="unidades" value="in" /> in
        <button type="button" id="botonCrear">Create piece</button>
      </form>
    </div>
    <div id="canvas2"></div>

  </body>
</html>
