<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CAO 3D TOOL</title>
    <style>
      body {
        margin: 0;
        font-family: Arial, Helvetica, sans-serif;
        height: 100vh;
        display: flex;
        flex-direction: column;
      }

      canvas {
        width: 100%;
        height: 100%;
      }

      #canvas2 {
        flex: 1;
        min-height: 500px;
      }

      #forma {
        margin-top: 5px;
      }
    </style>
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.180.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.180.0/examples/jsm/"
        }
      }
    </script>
  </head>
  <body oncontextmenu="return false;">
    <div id="forma">
      <form>
        Largo:
        <input type="number" name="largo" value="100" />
        Ancho:
        <input type="number" name="ancho" value="100" />
        Alto:
        <input type="number" name="alto" value="100" />
        <input type="radio" name="unidades" value="cm" checked /> cm
        <input type="radio" name="unidades" value="in" /> in
        <button type="button" id="botonCrear">Create piece</button>
      </form>
    </div>
    <div id="canvas2"></div>

      Piñeres G. , 27 november 2019
    </div>

    <script type="module" src="./canvas.js"></script>
  </body>
</html>
